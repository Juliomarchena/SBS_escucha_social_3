services:
  - type: web
    name: sbs-escucha-social
    runtime: python
    buildCommand: pip install --index-url https://download.pytorch.org/whl/cpu -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ANTHROPIC_API_KEY
        sync: false
